<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>&#xC2E0;&#xC120;&#xD1A0;&#xB860; &#xBAA8;&#xC544;&#xBCF4;&#xAE30;</title>
  <style>
    :root {
      --bg: #0f1117;
      --card: #1a1d27;
      --text: #dde1ec;
      --muted: #7b839e;
      --line: #282c3d;
      --accent: #818cf8;
      --accent-soft: #1e2040;
      --danger: #f87171;
      --prep-bg: #1e150a;
      --prep-line: #5c2d0a;
      --prep-text: #fdba74;
    }

    * { box-sizing: border-box; }

    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      padding: 24px 16px 64px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans KR", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.55;
    }

    .container {
      max-width: 760px;
      margin: 0 auto;
    }

    header {
      margin-bottom: 18px;
    }

    h1 {
      margin: 0 0 6px;
      font-size: 28px;
      letter-spacing: -0.04em;
    }

    .subtitle {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
    }

    .quick-menu {
      position: fixed;
      right: 14px;
      bottom: 14px;
      z-index: 100;
    }

    .quick-menu summary {
      width: 54px;
      height: 54px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      cursor: pointer;
      list-style: none;
      background: var(--accent);
      color: #fff;
      box-shadow: 0 10px 28px rgba(15, 23, 42, 0.25);
      font-size: 22px;
      font-weight: 900;
    }

    .quick-menu summary::-webkit-details-marker { display: none; }

    .quick-menu-panel {
      position: absolute;
      right: 0;
      bottom: 66px;
      width: min(300px, calc(100vw - 28px));
      max-height: 70vh;
      overflow: auto;
      padding: 12px;
      border-radius: 18px;
      background: var(--card);
      border: 1px solid var(--line);
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.5);
    }

    .quick-menu-panel h3 {
      margin: 4px 6px 10px;
      font-size: 15px;
    }

    .quick-menu-panel a {
      display: block;
      padding: 10px 12px;
      margin-top: 6px;
      border-radius: 12px;
      text-decoration: none;
      background: #20243a;
      color: var(--text);
      font-size: 14px;
      font-weight: 800;
    }

    .quick-menu-panel a:hover {
      background: var(--accent-soft);
      color: var(--accent);
    }

    section.dungeon {
      margin: 24px 0 32px;
    }

    .dungeon-title {
      position: sticky;
      top: 0;
      z-index: 20;
      margin-bottom: 14px;
      padding: 14px 16px;
      border-radius: 18px;
      background: rgba(26, 29, 39, 0.97);
      border: 1px solid var(--line);
      backdrop-filter: blur(10px);
    }

    .dungeon-title h2 {
      margin: 0;
      font-size: 22px;
      letter-spacing: -0.03em;
    }

    .rooms {
      display: grid;
      gap: 18px;
    }

    details.room {
      display: block;
      min-height: calc(100vh - 118px);
      border: 1px solid var(--line);
      border-radius: 24px;
      background: var(--card);
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.06);
      overflow: hidden;
      scroll-margin-top: 76px;
    }

    details.room:not([open]) { min-height: auto; }

    details.room > summary {
      padding: 18px 20px;
      cursor: pointer;
      list-style: none;
      font-size: 22px;
      font-weight: 900;
      letter-spacing: -0.03em;
      background: var(--card);
      border-bottom: 1px solid var(--line);
    }

    details.room > summary::-webkit-details-marker { display: none; }

    details.room > summary::after {
      content: "접기/펼치기";
      float: right;
      margin-top: 4px;
      padding: 3px 8px;
      border-radius: 999px;
      background: var(--line);
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0;
    }

    .room-body {
      padding: 18px;
    }

    .prep,
    .block,
    .key {
      border-radius: 18px;
      padding: 15px 16px;
      margin-bottom: 12px;
    }

    .prep {
      background: var(--prep-bg);
      border: 1px solid var(--prep-line);
    }

    .prep h4,
    .block h4 {
      margin: 0 0 8px;
      font-size: 15px;
    }

    .prep h4 { color: var(--prep-text); }
    .block h4 { color: #a0a8c0; }

    .prep-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .prep-list li {
      margin: 0;
      padding: 7px 11px;
      border-radius: 999px;
      background: #3d200a;
      color: var(--prep-text);
      font-size: 14px;
      font-weight: 900;
    }

    .block {
      background: #181b26;
      border: 1px solid var(--line);
    }

    ul, ol {
      margin: 0;
      padding-left: 22px;
    }

    li + li { margin-top: 5px; }

    .key {
      background: var(--accent-soft);
      border: 1px solid var(--line);
      font-size: 16px;
      font-weight: 900;
    }

    .danger {
      color: var(--danger);
      font-weight: 900;
    }

    .room-actions {
      position: sticky;
      bottom: 0;
      display: grid;
      grid-template-columns: 1fr 1.15fr;
      gap: 10px;
      margin: 18px -18px -18px;
      padding: 12px 18px;
      background: rgba(22, 25, 36, 0.97);
      border-top: 1px solid var(--line);
      backdrop-filter: blur(10px);
    }

    .room-link {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 62px;
      padding: 12px 14px;
      border-radius: 18px;
      text-decoration: none;
      text-align: center;
      background: var(--accent);
      color: #fff;
      font-size: 17px;
      font-weight: 900;
      box-shadow: 0 8px 18px rgba(91, 110, 225, 0.22);
    }

    .room-link.secondary {
      background: #252839;
      color: #b5bcd4;
      box-shadow: none;
    }

    @media (max-width: 520px) {
      body { padding: 18px 12px 64px; }
      h1 { font-size: 24px; }
      .dungeon-title h2 { font-size: 20px; }
      details.room { min-height: calc(100vh - 104px); }
      details.room > summary { font-size: 20px; }
      .room-actions { grid-template-columns: 1fr 1fr; }
      .room-link { min-height: 58px; font-size: 15px; }
    }

    .comment-toggle-btn {
      display: block;
      width: 100%;
      margin: 4px 0 0;
      padding: 11px 16px;
      border: 1.5px dashed #c7d2fe;
      border-radius: 14px;
      background: #f8f9ff;
      color: var(--accent);
      font-size: 14px;
      font-weight: 800;
      cursor: pointer;
      text-align: left;
      letter-spacing: -0.01em;
      transition: background 0.15s, border-color 0.15s;
    }
    .comment-toggle-btn:hover {
      background: var(--accent-soft);
      border-color: var(--accent);
    }
    .room-comment-section {
      margin: 10px 0 0;
    }
  
    section.dungeon { display: block !important; }
    div.room { border: 1px solid var(--line); border-radius: 24px; background: var(--card); box-shadow: 0 10px 30px rgba(15,23,42,0.06); overflow: hidden; scroll-margin-top: 76px; }
    .room-summary { margin: 0; padding: 18px 20px; font-size: 22px; font-weight: 900; letter-spacing: -0.03em; background: var(--card); border-bottom: 1px solid var(--line); }
    @media (max-width:520px) { .room-summary { font-size: 20px; } }
    .header-row { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; margin-bottom: 18px; }
    .header-row header { flex: 1; margin-bottom: 0; }
    .header-row .quick-menu { position: relative !important; right: auto !important; bottom: auto !important; flex-shrink: 0; margin-top: 2px; }
    .header-row .quick-menu summary { width: 42px; height: 42px; font-size: 18px; }
    .header-row .quick-menu-panel { top: calc(100% + 6px); bottom: auto !important; right: 0; }
    .dungeon-title { display: flex; justify-content: space-between; align-items: center; gap: 8px; }
    .dungeon-title h2 { flex: 1; margin: 0; }
    .room-bullets { display: flex; gap: 5px; align-items: center; flex-shrink: 0; }
    .rb { display: inline-flex; align-items: center; justify-content: center; min-width: 32px; height: 32px; padding: 0 8px; border-radius: 10px; font-size: 13px; font-weight: 900; text-decoration: none; background: rgba(30,32,50,0.8); color: var(--accent); border: 1.5px solid var(--line); transition: background 0.12s; }
    .rb:hover { background: var(--card); }
    .rb-active { background: var(--accent) !important; color: #fff !important; border-color: var(--accent) !important; }
    .comment-form { display:flex; flex-direction:column; gap:10px; margin-bottom:20px; }
    .cf-row { display:flex; gap:8px; }
    .cf-name,.cf-pw,.cf-msg { width:100%; box-sizing:border-box; padding:9px 13px; border-radius:10px; border:1px solid var(--line); background:var(--bg); color:var(--text); font-size:14px; font-family:inherit; }
    .cf-name { font-weight:700; flex:1; min-width:0; }
    .cf-pw { flex:0 0 140px; width:140px; font-size:12px; padding:9px 10px; }
    .cf-msg { min-height:80px; resize:vertical; }
    .cf-name::placeholder,.cf-pw::placeholder,.cf-msg::placeholder { color:var(--muted); opacity:1; }
    .cf-submit { align-self:flex-end; padding:8px 24px; background:var(--accent); color:#fff; border:none; border-radius:10px; font-size:14px; font-weight:700; cursor:pointer; transition:opacity .12s; }
    .cf-submit:hover { opacity:.85; } .cf-submit:disabled { opacity:.5; cursor:not-allowed; }
    .comment-item { padding:12px 0; border-bottom:1px solid var(--line); }
    .comment-item:last-child { border-bottom:none; }
    .ci-header { display:flex; align-items:center; gap:10px; margin-bottom:5px; }
    .ci-name { font-size:13px; font-weight:800; color:var(--accent); }
    .ci-date { font-size:12px; color:var(--muted); }
    .ci-body { font-size:14px; color:var(--text); white-space:pre-wrap; word-break:break-word; line-height:1.5; }
    .no-comments { color:var(--muted); font-size:14px; text-align:center; padding:20px 0; margin:0; }
    .ci-del { margin-left:auto; padding:2px 5px; background:transparent; border:none; color:var(--muted); font-size:13px; cursor:pointer; transition:color .12s; opacity:0.5; line-height:1; }
    .ci-del:hover { color:var(--danger); opacity:1; }
    .page-header { display:flex; align-items:center; gap:12px; margin-bottom:24px; padding-bottom:16px; border-bottom:1px solid var(--line); }
    .page-header h1 { font-size:20px; font-weight:900; color:var(--text); margin:0; }
    .back-btn { font-size:13px; color:var(--muted); text-decoration:none; border:1px solid var(--line); padding:4px 10px; border-radius:8px; flex-shrink:0; }
    .ac-item { padding:14px 16px; border:1px solid var(--line); border-radius:14px; background:var(--card); margin-bottom:10px; }
    .ac-meta { display:flex; align-items:center; gap:8px; margin-bottom:6px; flex-wrap:wrap; }
    .ac-page { font-size:11px; font-weight:700; background:var(--accent-soft,#1e2040); color:var(--accent); padding:2px 8px; border-radius:6px; text-decoration:none; border:1px solid var(--accent); white-space:nowrap; }
    .ac-page:hover { background:var(--accent); color:#fff; }
    .ac-name { font-size:13px; font-weight:800; color:var(--accent); }
    .ac-date { font-size:12px; color:var(--muted); }
    .ac-del { margin-left:auto; padding:2px 5px; background:transparent; border:none; color:var(--muted); font-size:13px; cursor:pointer; transition:color .12s; opacity:0.5; }
    .ac-del:hover { color:var(--danger); opacity:1; }
    .ac-body { font-size:14px; color:var(--text); white-space:pre-wrap; word-break:break-word; line-height:1.5; }
    .ac-empty { color:var(--muted); text-align:center; padding:40px 0; }
  </style>
</head>
<body>
  <div class="container">
    <div class="page-header">
      <a class="back-btn" href="cavern-1.html">&#x2190; &#xB4A4;&#xB85C;</a>
      <h1>&#128172; &#xC2E0;&#xC120;&#xD1A0;&#xB860; &#xBAA8;&#xC544;&#xBCF4;&#xAE30;</h1>
    </div>
    <div id="ac-list"><p class="ac-empty">\uBD88\uB7EC\uC624\uB294 \uC911...</p></div>
  </div>
  <script>
  (function(){
    var SB='https://gcenmjbozcqzyjrrkqqe.supabase.co',KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdjZW5tamJvemNxenlqcnJrcXFlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg5NDU1MDksImV4cCI6MjA5NDUyMTUwOX0.m4-LJgXfrVMxgesCugms-uo3anlGTUKKe6gFhf_vnhM';
    var PAGES={'cavern-1':'\uB300\uACF5\uB3D9 1\uBC88\uBC29','cavern-2':'\uB300\uACF5\uB3D9 2\uBC88\uBC29','cavern-boss':'\uB300\uACF5\uB3D9 \uBCF4\uC2A4\uBC29','temple-1':'\uC2E0\uC804 1\uBC88\uBC29','temple-2':'\uC2E0\uC804 2\uBC88\uBC29','temple-boss':'\uC2E0\uC804 \uBCF4\uC2A4\uBC29','altar-1':'\uC2E0\uB2E8 1\uBC88\uBC29','altar-2':'\uC2E0\uB2E8 2\uBC88\uBC29','altar-boss':'\uC2E0\uB2E8 \uBCF4\uC2A4\uBC29','dump-1':'\uD3D0\uD5C8 1\uBC88\uBC29','dump-2':'\uD3D0\uD5C8 2\uBC88\uBC29','dump-boss':'\uD3D0\uD5C8 \uBCF4\uC2A4\uBC29'};
    var lst=document.getElementById('ac-list');
    function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
    function fmt(t){var d=new Date(t);return d.getFullYear()+'.'+String(d.getMonth()+1).padStart(2,'0')+'.'+String(d.getDate()).padStart(2,'0')+' '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');}
    function load(){
      fetch(SB+'/rest/v1/comments?is_deleted=eq.false&order=created_at.desc&select=id,page_id,name,content,created_at',{cache:'no-store',headers:{'apikey':KEY,'Authorization':'Bearer '+KEY}})
      .then(function(r){return r.json();}).then(function(rows){
        if(!Array.isArray(rows)||!rows.length){lst.innerHTML='<p class="ac-empty">\uC544\uC9C1 \uB313\uAE00\uC774 \uC5C6\uC2B5\uB2C8\uB2E4.</p>';return;}
        lst.innerHTML=rows.map(function(c){var lbl=PAGES[c.page_id]||c.page_id;return '<div class="ac-item"><div class="ac-meta"><a class="ac-page" href="'+esc(c.page_id)+'.html">'+esc(lbl)+'</a><span class="ac-name">'+esc(c.name)+'</span><span class="ac-date">'+fmt(c.created_at)+'</span><button class="ac-del" data-id="'+c.id+'">&#x2715;</button></div><div class="ac-body">'+esc(c.content)+'</div></div>';}).join('');
      }).catch(function(){lst.innerHTML='<p class="ac-empty">\uB313\uAE00\uC744 \uBD88\uB7EC\uC624\uC9C0 \uBABB\uD588\uC2B5\uB2C8\uB2E4.</p>';});
    }
    lst.addEventListener('click',function(e){
      if(!e.target.classList.contains('ac-del'))return;
      var id=e.target.getAttribute('data-id');
      var pw=prompt('\uBE44\uBC00\uBC88\uD638\uB97C \uC785\uB825\uD558\uC138\uC694');
      if(pw===null)return;
      var h={'apikey':KEY,'Authorization':'Bearer '+KEY,'Content-Type':'application/json'};
      var base=SB+'/rest/v1/comments?id=eq.'+id;
      if(pw.trim()==='freshpotato'){
        fetch(base,{method:'PATCH',headers:h,body:JSON.stringify({is_deleted:true})})
        .then(function(r){if(r.ok){load();}else{alert('\uC0AD\uC81C \uC2E4\uD328 ('+r.status+').');}})
        .catch(function(){alert('\uB124\uD2B8\uC6CC\uD06C \uC624\uB958.');});
      } else {
        h['Prefer']='return=representation';
        fetch(base+'&password=eq.'+encodeURIComponent(pw.trim()),{method:'PATCH',headers:h,body:JSON.stringify({is_deleted:true})})
        .then(function(r){return r.json();})
        .then(function(rows){if(!Array.isArray(rows)||!rows.length){alert('\uBE44\uBC00\uBC88\uD638\uAC00 \uB2E4\uB985\uB2C8\uB2E4.');}else{load();}})
        .catch(function(){alert('\uB124\uD2B8\uC6CC\uD06C \uC624\uB958.');});
      }
    });
    load();
  })();
  </script>
</body>
</html>
